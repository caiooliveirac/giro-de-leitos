# nginx/giro.mnrs.com.br.conf
#
# Server block para giro.mnrs.com.br.
#
# PRE-REQUISITO (one-time):
#   Adicionar em /etc/nginx/conf.d/mnrs-host-upstreams.conf:
#
#     upstream canary_giro_frontend {
#         server 127.0.0.1:3050;
#         keepalive 16;
#     }
#
#   O upstream `canary_giro` (api em 127.0.0.1:8000) ja existe nesse arquivo,
#   reaproveitamos sem rewrite.
#
# Cert: Cloudflare Origin wildcard *.mnrs.com.br
#   /home/ubuntu/samu-normas/repo/nginx/ssl/cloudflare-origin.crt
#   /home/ubuntu/samu-normas/repo/nginx/ssl/cloudflare-origin.key
#
# Cloudflare ja forca HTTPS; o redirect HTTP->HTTPS abaixo eh defensivo.

server {
    listen 80;
    listen [::]:80;
    server_name giro.mnrs.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name giro.mnrs.com.br;

    ssl_certificate     /home/ubuntu/samu-normas/repo/nginx/ssl/cloudflare-origin.crt;
    ssl_certificate_key /home/ubuntu/samu-normas/repo/nginx/ssl/cloudflare-origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 5m;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket (parser-api) — antes de /api/ por especificidade
    location /ws/ {
        proxy_pass http://canary_giro;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # API REST — reusa upstream canary_giro (127.0.0.1:8000) ja definido
    location /api/ {
        proxy_pass http://canary_giro;
        proxy_read_timeout 60s;
    }

    # Frontend Next.js (standalone) em 127.0.0.1:3050
    location / {
        proxy_pass http://canary_giro_frontend;
        proxy_read_timeout 60s;
    }
}

# nginx/giro-app.conf
#
# Bloco para o subdomínio do frontend: giro.mnrs.com.br
#
#   /          -> container `giro-de-leitos-frontend` (Next.js standalone, porta 3000)
#   /api/*     -> container `giro-de-leitos-api`      (FastAPI, porta 8000)
#   /ws/*      -> WebSocket -> mesmo parser-api (upgrade)
#
# Pré-requisitos:
#   - DNS apontando giro.mnrs.com.br para o servidor.
#   - Cert TLS emitido (ver DEPLOY.md, seção Certbot).
#   - Nginx está NA MESMA REDE docker que os containers (provavelmente
#     `perguntas_default`, idêntico ao restante do stack mnrs).
#
# OBS sobre upstreams:
#   Usamos os NOMES dos containers (giro-de-leitos-frontend etc.) pois o
#   nginx do mnrs.com.br vive na rede `perguntas_default` e o DNS interno
#   do docker resolve esses nomes. Se o seu nginx vive fora do docker,
#   troque por `127.0.0.1:3000` / `127.0.0.1:8000` e exponha portas no
#   docker-compose.prod.yml.

upstream giro_frontend_upstream {
    server giro-de-leitos-frontend:3000;
    keepalive 16;
}

upstream giro_api_upstream {
    server giro-de-leitos-api:8000;
    keepalive 16;
}

# --- HTTP -> HTTPS ---------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name giro.mnrs.com.br;

    # ACME challenge (se usar webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS principal -------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name giro.mnrs.com.br;

    # Ajuste os paths abaixo conforme onde o certbot grava certs.
    ssl_certificate     /etc/letsencrypt/live/giro.mnrs.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/giro.mnrs.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Tamanho aceitável de upload (ingestão de WhatsApp pode ser robusta)
    client_max_body_size 5m;

    # Headers de proxy comuns
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # --- WebSocket (parser-api /ws/*) -------------------------------
    # Deve vir antes do `/api/` por especificidade do prefixo.
    location /ws/ {
        proxy_pass http://giro_api_upstream;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;   # WS longevo
        proxy_send_timeout 3600s;
    }

    # --- API REST ----------------------------------------------------
    location /api/ {
        proxy_pass http://giro_api_upstream;
        proxy_read_timeout 60s;
    }

    # --- Frontend Next.js -------------------------------------------
    # Catch-all para SSR + assets estáticos.
    location / {
        proxy_pass http://giro_frontend_upstream;
        proxy_read_timeout 60s;
    }
}
